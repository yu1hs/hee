<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>HEE · 痕迹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', 'Fira Code', monospace;
        }

        .boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .boot-content {
            text-align: center;
            padding: 20px;
        }

        .boot-logo {
            font-size: 48px;
            color: #5f8b6f;
            letter-spacing: 8px;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        .boot-text {
            color: #5f8b6f;
            font-size: 14px;
            margin: 8px 0;
            opacity: 0;
            animation: fadeInUp 0.3s forwards;
        }

        .boot-text:nth-child(2) { animation-delay: 0.2s; }
        .boot-text:nth-child(3) { animation-delay: 0.5s; }
        .boot-text:nth-child(4) { animation-delay: 0.8s; }

        .name-input-container {
            margin-top: 30px;
            opacity: 0;
            animation: fadeInUp 0.3s forwards;
            animation-delay: 1.2s;
        }

        .name-input {
            background: transparent;
            border: 1px solid #5f8b6f;
            padding: 10px 16px;
            color: #5f8b6f;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
            width: 200px;
            outline: none;
        }

        .name-input::placeholder {
            color: #3a5a4a;
        }

        .start-btn {
            margin-top: 16px;
            padding: 8px 24px;
            background: transparent;
            border: 1px solid #5f8b6f;
            color: #5f8b6f;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s;
        }

        .start-btn:hover {
            background: #5f8b6f;
            color: #000000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .cursor-blink::after {
            content: '_';
            animation: blink 1s step-end infinite;
        }

        #desktop-container {
            width: 100%;
            height: 100vh;
            display: none;
        }
    </style>
</head>
<body>
    <div id="boot-screen" class="boot-screen">
        <div class="boot-content">
            <div class="boot-logo">HEE</div>
            <div class="boot-text">Booting...</div>
            <div class="boot-text">Loading system files...</div>
            <div class="boot-text">Last login: <span id="last-login">--</span></div>
            <div class="name-input-container">
                <input type="text" id="user-name" class="name-input" placeholder="输入你的名字" maxlength="20">
                <br>
                <button id="start-desktop" class="start-btn">进入</button>
            </div>
        </div>
    </div>

    <div id="desktop-container"></div>

    <script>
        const bootScreen = document.getElementById('boot-screen');
        const desktopContainer = document.getElementById('desktop-container');
        const userNameInput = document.getElementById('user-name');
        const startBtn = document.getElementById('start-desktop');
        
        let now = new Date().toISOString().slice(0, 19).replace('T', ' ');
        document.getElementById('last-login').textContent = localStorage.getItem('hee_last_login') || '2024-12-31 04:13:00';
        
        // 检查是否已有用户名
        let savedName = localStorage.getItem('hee_username');
        if (savedName) userNameInput.value = savedName;
        
        // 强制重置：首次进入从第1天开始
        const isFirstTime = localStorage.getItem('hee_initialized') !== 'true';
        
        function enterDesktop() {
            let userName = userNameInput.value.trim();
            if (!userName) userName = '陌生人';
            localStorage.setItem('hee_username', userName);
            localStorage.setItem('hee_last_login', now);
            
            if (isFirstTime) {
                // 首次进入：完全重置
                localStorage.clear();
                localStorage.setItem('hee_day', '1');
                localStorage.setItem('hee_residue', '0');
                localStorage.setItem('hee_first_popup', 'false');
                localStorage.setItem('hee_initialized', 'true');
                localStorage.setItem('hee_username', userName);
                localStorage.setItem('hee_last_login', now);
                console.log('首次进入，已重置，第1天');
            } else {
                // 非首次：确保天数有效
                let savedDay = parseInt(localStorage.getItem('hee_day') || '1');
                if (savedDay < 1 || savedDay > 7 || isNaN(savedDay)) {
                    localStorage.setItem('hee_day', '1');
                }
                if (localStorage.getItem('hee_residue') === null) {
                    localStorage.setItem('hee_residue', '0');
                }
                console.log('当前天数:', localStorage.getItem('hee_day'));
            }
            
            bootScreen.style.opacity = '0';
            setTimeout(() => {
                bootScreen.style.display = 'none';
                desktopContainer.style.display = 'block';
                loadDesktop();
            }, 300);
        }
        
        startBtn.addEventListener('click', enterDesktop);
        userNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enterDesktop();
        });
        
        function loadDesktop() {
            fetch('desktop.html')
                .then(response => response.text())
                .then(html => {
                    desktopContainer.innerHTML = html;
                    // 按顺序加载脚本
                    const scripts = ['js/audio.js', 'js/desktop.js', 'js/story.js'];
                    let index = 0;
                    function loadNext() {
                        if (index >= scripts.length) return;
                        const script = document.createElement('script');
                        script.src = scripts[index];
                        script.onload = () => { index++; loadNext(); };
                        document.body.appendChild(script);
                    }
                    loadNext();
                })
                .catch(err => {
                    console.error('加载失败:', err);
                    desktopContainer.innerHTML = '<div style="color:#5f8b6f; text-align:center; padding:50px;">加载失败，请刷新重试</div>';
                });
        }
    </script>
</body>
</html>
