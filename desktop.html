<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HEE · 桌面</title>
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/window.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
<div class="desktop" id="desktop">
    <div class="desktop-wallpaper" id="desktop-wallpaper"></div>
    
    <div class="desktop-icons" id="desktop-icons">
        <div class="desktop-icon" data-app="mycomputer">
            <div class="icon-image">🖥️</div>
            <div class="icon-label">我的电脑</div>
        </div>
        <div class="desktop-icon" data-app="recycle">
            <div class="icon-image">🗑️</div>
            <div class="icon-label">回收站</div>
        </div>
        <div class="desktop-icon" data-app="browser">
            <div class="icon-image">🌐</div>
            <div class="icon-label">浏览器</div>
        </div>
        <div class="desktop-icon" data-app="diary">
            <div class="icon-image">📓</div>
            <div class="icon-label">日记本.txt</div>
        </div>
        <div class="desktop-icon" data-app="photos">
            <div class="icon-image">🖼️</div>
            <div class="icon-label">照片</div>
        </div>
        <div class="desktop-icon" data-app="stickynotes">
            <div class="icon-image">📌</div>
            <div class="icon-label">便签</div>
        </div>
        <div class="desktop-icon" data-app="favorites">
            <div class="icon-image">⭐</div>
            <div class="icon-label">收藏夹</div>
        </div>
        <div class="desktop-icon" data-app="memo">
            <div class="icon-image">📝</div>
            <div class="icon-label">备忘录.exe</div>
        </div>
        <div class="desktop-icon" data-app="logs">
            <div class="icon-image">📋</div>
            <div class="icon-label">日志.log</div>
        </div>
        <div class="desktop-icon" data-app="notepad">
            <div class="icon-image">📄</div>
            <div class="icon-label">记事本</div>
        </div>
        <div class="desktop-icon" data-app="paint">
            <div class="icon-image">🎨</div>
            <div class="icon-label">画图</div>
        </div>
        <div class="desktop-icon" data-app="calculator">
            <div class="icon-image">🔢</div>
            <div class="icon-label">计算器</div>
        </div>
        <div class="desktop-icon" data-app="terminal">
            <div class="icon-image">⌨️</div>
            <div class="icon-label">终端</div>
        </div>
        <div class="desktop-icon" data-app="calendar">
            <div class="icon-image">📅</div>
            <div class="icon-label">日历</div>
        </div>
        <div class="desktop-icon" data-app="alarm">
            <div class="icon-image">⏰</div>
            <div class="icon-label">闹钟</div>
        </div>
        <div class="desktop-icon" data-app="contacts">
            <div class="icon-image">👥</div>
            <div class="icon-label">通讯录</div>
        </div>
        <div class="desktop-icon" data-app="email">
            <div class="icon-image">📧</div>
            <div class="icon-label">邮箱</div>
        </div>
        <div class="desktop-icon" data-app="run">
            <div class="icon-image">⚙️</div>
            <div class="icon-label">运行</div>
        </div>
        <div class="desktop-icon hidden" id="secret-folder" data-app="secret">
            <div class="icon-image">📁</div>
            <div class="icon-label">一个陌生的文件夹</div>
        </div>
        <div class="desktop-icon hidden" id="welcome-file" data-app="welcome">
            <div class="icon-image">📄</div>
            <div class="icon-label">欢迎.txt</div>
        </div>
    </div>
    
    <div class="taskbar" id="taskbar">
        <div class="start-button" id="start-button">
            <span class="start-icon">🔘</span>
            <span class="start-text">开始</span>
        </div>
        <div class="taskbar-tray" id="taskbar-tray"></div>
        <div class="system-tray">
            <span class="tray-icon">🔊</span>
            <span class="tray-icon">🌐</span>
            <span class="tray-time" id="tray-time">--:--</span>
        </div>
    </div>
    
    <div class="start-menu hidden" id="start-menu">
        <div class="start-menu-header">
            <div class="start-menu-user">User</div>
        </div>
        <div class="start-menu-items">
            <div class="start-menu-item" data-app="mycomputer">🖥️ 我的电脑</div>
            <div class="start-menu-item" data-app="browser">🌐 浏览器</div>
            <div class="start-menu-item" data-app="diary">📓 日记本</div>
            <div class="start-menu-divider"></div>
            <div class="start-menu-item" id="shutdown">🔌 关机</div>
        </div>
    </div>
    
    <div id="popup-container"></div>
    <div id="windows-container"></div>
</div>

<script src="js/audio.js"></script>
<script src="js/desktop.js"></script>
<script src="js/story.js"></script>
</body>
</html>
